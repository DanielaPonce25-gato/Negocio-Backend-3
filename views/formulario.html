
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="/uploads/logo.jpg" type="image/x-icon">
    <title>MondoCompras</title>

    <link rel="stylesheet" href="/css/formulario.css">
    <script src="/tools/formulario.js" defer></script>

</head>

<body>

<div class="container">

    <h2>Registro de Usuario</h2>

    <form id="userForm">

        <label for="firstName">Nombre</label>
        <input
            type="text"
            id="firstName"
            name="firstName"
            required>

        <label for="lastName">Apellido</label>
        <input
            type="text"
            id="lastName"
            name="lastName"
            required>

        <label for="email">Email</label>
        <input
            type="email"
            id="email"
            name="email"
            required>

        <label for="password">Contraseña</label>
        <input
            type="password"
            id="password"
            name="password"
            required>

        <label for="addressLabel">Tipo de Dirección</label>
        <select id="addressLabel" name="addressLabel" required>
            <option value="">Seleccione tipo</option>
            <option value="home">Casa</option>
            <option value="work">Trabajo</option>
        </select>

        <label for="address">Dirección</label>
        <input
            type="text"
            id="address"
            name="address"
            required>

        <label for="reference">Referencia (opcional)</label>
        <input
            type="text"
            id="reference"
            name="reference"
            placeholder="Ej: Portón negro, departamento 5">

        <label for="role">Rol</label>
        <select id="role" name="role" required>
            <option value="">Seleccione un rol</option>
            <option value="customer">Cliente</option>
            <option value="driver">Repartidor</option>
            <option value="store">Tienda</option>
            <option value="admin">Administrador</option>
        </select>

        <label for="profileImage">Foto de perfil (opcional)</label>
        <input type="file" id="profileImage" name="profileImage" accept="image/*">
        <small>Formatos aceptados: JPG, PNG, WebP, GIF (máx 5MB)</small>

        <button type="submit">
            Registrar
        </button>

    </form>

    <div id="respuesta">
        Esperando respuesta...
    </div>

    <button type="button"><link rel="stylesheet" href="/views/"></button>

    <button type="button"><link rel="stylesheet" href="/views/home.html"></button>

</div>

<script>

</script>

</body>
</html>
