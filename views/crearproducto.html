
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/uploads/logo.jpg" type="image/x-icon">
    <title>Crear producto</title>
    <link rel="stylesheet" href="/css/creaproducto.css">
    <script src="/tools/creaproducto.js" defer></script>
</head>
<body>
    <div class="container">
        <h2>Crear producto</h2>
        <p id="userStatus" class="status">Verificando usuario registrado...</p>

        <form id="productForm" novalidate>
            <input type="hidden" id="seller" name="seller">

            <label for="title">Título</label>
            <input type="text" id="title" name="title" required>

            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" required></textarea>

            <label for="price">Precio</label>
            <input type="number" id="price" name="price" step="0.01" min="0" required>

            <label for="stock">Stock</label>
            <input type="number" id="stock" name="stock" min="0" value="1" required>

            <label for="category">Categoría</label>
            <select id="category" name="category" required>
                <option value="">Seleccione una categoría</option>
                <option value="Ropa">Ropa</option>
                <option value="Eletródomesticos">Eletródomesticos</option>
                <option value="Hogar">Hogar</option>
                <option value="Libros">Libros</option>
                <option value="Deportes">Deportes</option>
                <option value="Tecnologia">Tecnología</option>
                <option value="Belleza">Belleza</option>
                <option value="Perfumeria">Perfumería</option>
                <option value="Juguetes">Juguetes</option>
                <option value="Alimentos">Alimentos</option>
                <option value="Alimento de Mascota">Alimento de Mascota</option>
                <option value="Juguetes para Mascotas">Juguetes para Mascotas</option>
            </select>

            <label for="imageUrls">URLs de imágenes (opcional)</label>
            <input type="text" id="imageUrls" name="imageUrls" placeholder="https://img1.com, https://img2.com">

            <label for="imageFiles">O sube archivos de imagen (opcional)</label>
            <input type="file" id="imageFiles" name="images" multiple accept="image/*">
            <small>Puedes seleccionar múltiples archivos JPG, PNG, WebP o GIF</small>

            <button type="submit" id="submitBtn">Crear producto</button>
        </form>

        <div id="respuesta">Esperando respuesta...</div>
        <a class="secondary-link" href="/formulario">Registrarme</a>
    </div>
</body>
</html>
